<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isi Formulir</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffe4f3, #ffb6e0, #ff8fd1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.25);
            overflow: hidden;
            text-align: center;
            padding: 50px 30px;
            border: 3px solid #ff69b4;
        }
        .header {
            margin-bottom: 40px;
        }
        .heart {
            font-size: 4.5rem;
            margin-bottom: 15px;
            animation: heartbeat 1.5s infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.18); }
        }
        h1 {
            font-size: 2.6rem;
            color: #db2777;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #e11d8e;
            font-size: 1.15rem;
            font-weight: 500;
        }
        .btn-pink {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #ff1493, #db2777);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 600;
            text-decoration: none;
            margin: 15px 0;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(219, 39, 119, 0.45);
            width: 100%;
            max-width: 340px;
        }
        .btn-pink:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 15px 35px rgba(219, 39, 119, 0.55);
            background: linear-gradient(135deg, #db2777, #be185d);
        }
        .btn-pink .arrow {
            transition: transform 0.3s ease;
        }
        .btn-pink:hover .arrow {
            transform: translateX(10px);
        }
        .note {
            color: #e11d8e;
            font-size: 1rem;
            line-height: 1.7;
            margin-top: 30px;
            opacity: 0.9;
        }
        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 40px 20px;
            }
            h1 {
                font-size: 2.3rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="heart">💖</div>
                <h1>Selamat Datang!</h1>
                <p class="subtitle">Silakan pilih menu berikut</p>
            </div>
           
            <div>
                <!-- Tombol Tugas Kelompok -->
                <a href="https://alfirajingga-13.github.io/ALFIRA-JINGGAWATI-TAMA-9/"
                   target="_blank"
                   class="btn-pink">
                    <span>Lihat Tugas Kelompok</span>
                    <span class="arrow">→</span>
                </a>

                <!-- Tombol Tugas Individu  -->
                <a href="https://alfirajingga-13.github.io/ALFIRA-JINGGAWATI-TAMA-9/" 
                   target="_blank"
                   class="btn-pink">
                    <span>Lihat Tugas Individu</span>
                    <span class="arrow">→</span>
                </a>
               
                <p class="note">
                    Terima kasih banyak atas partisipasinya 💕
                </p>
            </div>
        </div>
    </div>
</body>
</html>
